[build]
  command = "echo 'static site - no build step'"
  publish = "."

[dev]
  framework = "#static"
  port = 8888
  publish = "."
  autoLaunch = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
